name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract release notes from tag commit
        id: notes
        run: |
          # Get the commit message of the tagged commit (skip first line "Release vX.Y.Z")
          NOTES=$(git log -1 --pretty=format:"%b" ${{ github.ref_name }})
          # Store as multiline output
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.notes }}
          make_latest: true
