name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: [ '8.0', '8.1', '8.2', '8.3' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: soap, openssl, dom
          coverage: xdebug

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Set up test certificates
        env:
          CERT_GPE_PRIVATE_B64:    ${{ secrets.CERT_GPE_PRIVATE_B64 }}
          CERT_GPE_PUBLIC_B64:     ${{ secrets.CERT_GPE_PUBLIC_B64 }}
          CERT_MERCHANT_PRIVATE_B64: ${{ secrets.CERT_MERCHANT_PRIVATE_B64 }}
        run: |
          mkdir -p certs
          echo "$CERT_GPE_PRIVATE_B64"    | base64 --decode > certs/gpwebpay-pvk_GPE_TEST.key
          echo "$CERT_GPE_PUBLIC_B64"     | base64 --decode > certs/gpwebpay-pub_GPE_TEST.pem
          echo "$CERT_MERCHANT_PRIVATE_B64" | base64 --decode > certs/gpwebpay-pvk_MERCHANT_TEST.key

      - name: Run tests with coverage
        run: ./vendor/bin/phpunit --coverage-clover coverage.xml
        env:
          GPWEBPAY_MERCHANT_PRIVATE_KEY_PASSWORD: ${{ secrets.GPWEBPAY_MERCHANT_PRIVATE_KEY_PASSWORD }}

      - name: Upload coverage to Codecov
        if: matrix.php == '8.3'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
